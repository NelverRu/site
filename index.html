            font-size: 1.125rem;

        /* Progress bar */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: transparent;
            z-index: 9999;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #3772ff;
            z-index: 10000;
            pointer-events: none;
            width: 0%;
            transition: width 0.1s linear;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(32px);
            padding: 0.5rem 0;
        }

        .header-container {
            max-width: 1280px;
            margin: 0;
            padding-left: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            margin-left: 0;
            padding-left: 0;
        }

        .logo img { 
            height: 128px;
            width: auto;
            display: block;
        }
        
        .nh-features { background-color: rgba(204, 213, 203, 0.3); }

        .nh-features__items { display: flex; flex-direction: column; gap: 0; }
        .nh-features__item-wrapper { padding: 2rem 0; }
        
        .nh-features__figure {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0;
        }  

        /* Блок с картинкой */
        .nh-features__image-block {
            flex: 0 0 41.666%;
            max-width: 41.666%;
            text-align: center;
            padding: 0;
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }

        /* Сама картинка - стандартные правила */
        .nh-features__image-block img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ↓↓↓ СЮДА ВСТАВЬТЕ КОД ДЛЯ УПРАВЛЕНИЯ РАЗМЕРАМИ КАРТИНОК ↓↓↓ */
        /* ============================================ */

        .nh-features__item:nth-child(1) .nh-features__image-block img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nh-features__item:nth-child(2) .nh-features__image-block img {
            width: 70%;           /* ← МЕНЯЙТЕ ЗНАЧЕНИЕ (60%, 70%, 80%) */
            height: auto;         /* ← АВТОМАТИЧЕСКАЯ ВЫСОТА */
            object-fit: contain;  /* ← ВЕСЬ РИСУНОК ВИДЕН */
            margin: 0 auto;       /* ← ЦЕНТРИРУЕТ */
        }

        /* Блок 3 - Сервисы для IPTV */
        .nh-features__item:nth-child(3) .nh-features__image-block img {
            width: 70%;
            height: 70%;
            object-fit: cover;
        }

        /* Блок 4 - FM Radio Stations (УМЕНЬШИТЕ ЗДЕСЬ) */
        .nh-features__item:nth-child(4) .nh-features__image-block img {
            width: 70%;
            height: 70%;
            object-fit: contain;  /* ← ВЕСЬ РИСУНОК ВИДЕН */
            margin: 0 auto;       /* ← ЦЕНТРИРУЕТ */
        }

        /* Блок 5 - Ашик Умера */
        .nh-features__item:nth-child(5) .nh-features__image-block img {
            width: 90%;
            height: 90%;
            object-fit: cover;
        }

        /* Блок 6 - Ученическая (УМЕНЬШИТЕ ЗДЕСЬ) */
        .nh-features__item:nth-child(6) .nh-features__image-block img {
            width: 70%;
            height: 70%;
            object-fit: contain;  /* ← ВЕСЬ РИСУНОК ВИДЕН */
            margin: 0 auto;       /* ← ЦЕНТРИРУЕТ */

        /* ↑↑↑ ВЫШЕ ВСТАВЬТЕ КОД ДЛЯ УПРАВЛЕНИЯ РАЗМЕРАМИ КАРТИНОК ↑↑↑ */

            flex: 0 0 58.333%;
            max-width: 58.333%;
            padding: 2.5rem 3rem;
            background: rgba(255, 255, 255, 0);

            flex-direction: row-reverse;
        }
        .nh-features__item:nth-child(even) .nh-features__figure {
            flex-direction: row;
        }
        
        /* Заголовки */
        .nh-features__title h4 {
            font-size: 2rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 1.75rem;
            line-height: 1.2;
        }

            color: #000000;
            font-size: 1.125rem;
            line-height: 1.5;
        }

        .nh-features__text a { color: #1a9be8; text-decoration: underline; word-break: break-word; }
        .nh-features__text a:hover { text-decoration: underline; }
        .nh-features__text strong { color: #000000; font-weight: 700; }
        .nh-features__text a strong { color: #1a9be8; }
        .nh-features__text .org-name { color: #1a9be8; }

            .nh-features__image-block { flex: 0 0 100%; max-width: 100%; margin-bottom: 1.25rem; }
